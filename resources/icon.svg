<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2240"/>
      <stop offset="100%" stop-color="#0B1121"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" stroke="#3A3558" stroke-width="2"/>
  <!-- Network nodes -->
  <circle cx="90" cy="86" r="16" fill="url(#accent)" opacity="0.9"/>
  <circle cx="90" cy="86" r="10" fill="#FFFFFF" opacity="0.3"/>
  <rect x="148" y="70" width="32" height="32" rx="6" fill="#D4A574" opacity="0.9"/>
  <rect x="155" y="77" width="18" height="18" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="90" cy="170" r="16" fill="#4CAF50" opacity="0.85"/>
  <circle cx="90" cy="170" r="10" fill="#FFFFFF" opacity="0.2"/>
  <rect x="148" y="154" width="32" height="32" rx="6" fill="#EF4444" opacity="0.8"/>
  <rect x="155" y="161" width="18" height="18" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <!-- Connections -->
  <line x1="106" y1="86" x2="148" y2="86" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="106" y1="170" x2="148" y2="170" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="102" x2="90" y2="154" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="164" y1="102" x2="164" y2="154" stroke="#D4A574" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Animated dots on connections -->
  <circle cx="120" cy="86" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="120" cy="170" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="90" cy="128" r="4" fill="#FFFFFF" opacity="0.7"/>
</svg>
